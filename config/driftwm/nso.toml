# driftwm NSO widget overrides.
#
# Calendar weather follows the upstream Rainmeter skin:
# - LocationCode is the OpenWeatherMap city ID from URLs like
#   https://openweathermap.org/city/2643743
# - ApiKey is your OpenWeatherMap API key.

[ui]
scale = 1.5

[calendar]
TimeFormat1224 = 12

[calendar.weather]
enabled = false
provider = "openweathermap"
LocationCode = "Paste Here!"
ApiKey = "Paste Here!"
Units = "metric"
refresh_minutes = 60
